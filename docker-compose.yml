services:
  localstack:
    image: localstack/localstack:3
    container_name: ecommerce-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      EAGER_SERVICE_LOADING: "1"
      LAMBDA_DOCKER_NETWORK: aws-local-monorepo
      LOCALSTACK_HOST: localstack
      PERSISTENCE: "1"
      SERVICES: cloudformation,cloudwatch,logs,iam,sts,s3,dynamodb,lambda,apigateway,ecr,ssm
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - local-aws
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  cdk-local:
    build:
      context: .
      dockerfile: docker/cdk-local/Dockerfile
    container_name: ecommerce-cdk-local
    working_dir: /workspace
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CDK_DEFAULT_ACCOUNT: ${CDK_DEFAULT_ACCOUNT:-000000000000}
      CDK_DEFAULT_REGION: ${CDK_DEFAULT_REGION:-us-east-1}
      LOCALSTACK_ENDPOINT: ${LOCALSTACK_ENDPOINT:-http://localstack:4566}
      PROJECT_NAME: ${PROJECT_NAME:-ecommerce-local}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - local-aws
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    networks:
      - local-aws
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  localstack-data:

networks:
  local-aws:
    name: aws-local-monorepo
    driver: bridge
